<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Day Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <h1>Day Planner</h1>
    <span class="session-badge" id="meta-row" style="display:none;"></span>
  </header>

  <div class="app-body">

    <!-- Left: Calendar (main artifact) -->
    <div class="calendar-column">
      <div class="calendar-panel">
        <div class="calendar-panel-title">Schedule</div>
        <div class="calendar-scroll" id="calendar-scroll">
          <div class="calendar-grid" id="calendar-grid">
            <div class="calendar-time-axis" id="calendar-time-axis"></div>
            <div class="calendar-events" id="calendar-events"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Compact sidebar -->
    <aside class="sidebar">

      <div class="error-banner" id="error-banner"></div>

      <!-- Single prompt section (used for both plan + replan) -->
      <div class="prompt-section">
        <label for="context">What&rsquo;s on today?</label>
        <textarea
          id="context"
          placeholder="e.g. I need to finish a report, lunch at noon, meeting 2–3pm, done by 6."
        ></textarea>
        <div class="time-row">
          <span class="time-label">Now</span>
          <input type="time" id="current_time_input" class="time-input" />
        </div>
        <button class="btn btn-primary" id="plan-btn">
          <span class="btn-icon">&#9654;</span>
          <span id="plan-btn-label">Plan my day</span>
        </button>
        <small class="tip-text">Ctrl/&#8984;+Enter to submit</small>
      </div>

      <!-- Feasibility (shown after first plan) -->
      <div class="confidence-row" id="confidence-row" style="display:none;">
        <span>Feasibility</span>
        <span class="confidence-value" id="confidence-value">&mdash;</span>
        <div class="confidence-bar-wrap">
          <div class="confidence-bar-fill" id="confidence-bar-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Next actions + Dropped (compact, shown after plan) -->
      <div class="sidebar-summary" id="sidebar-summary" style="display:none;">
        <div class="summary-section">
          <h3>&#9889; Next</h3>
          <div id="summary-next-actions"><span class="empty-note">None listed.</span></div>
        </div>
        <div class="summary-section">
          <h3>&#10008; Dropped</h3>
          <div id="summary-dropped"><span class="empty-note">Nothing dropped.</span></div>
        </div>
      </div>

      <!-- Advanced options (collapsed) -->
      <div class="advanced-wrap">
        <button class="advanced-toggle" id="advanced-toggle-btn">Show advanced options</button>
        <div class="advanced-options" id="advanced-options">
          <div>
            <label for="session_label">Session label (optional)</label>
            <input id="session_label" name="session_label" type="text" placeholder="e.g. work, personal" />
          </div>
          <div>
            <label for="date_override">Date override (YYYY-MM-DD)</label>
            <input id="date_override" name="date_override" type="text" placeholder="Leave blank for today" />
          </div>
        </div>
      </div>

    </aside>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
